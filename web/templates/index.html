<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYVL Servant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0a0a0a;
  --surface:      #111111;
  --surface-2:    #181818;
  --border:       #222222;
  --border-2:     #2e2e2e;
  --green:        #00ff66;
  --green-dim:    rgba(0, 255, 102, 0.55);
  --green-glow:   rgba(0, 255, 102, 0.10);
  --green-glow-2: rgba(0, 255, 102, 0.18);
  --text:         #e8e8e8;
  --text-dim:     #888888;
  --text-muted:   #444444;
  --red:          #ff4455;
  --yellow:       #ffcc33;
  --blue:         #4499ff;
  --purple:       #bb99ff;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--green); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ───────────────────────────────────────────────────────────── */
.container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }

/* ── Header ───────────────────────────────────────────────────────────── */
header {
  border-bottom: 1px solid var(--border);
  padding: 18px 0;
  position: sticky;
  top: 0;
  background: rgba(10, 10, 10, 0.96);
  backdrop-filter: blur(12px);
  z-index: 100;
}

header .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand { display: flex; align-items: baseline; gap: 12px; }

.brand-name {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--green);
  text-transform: uppercase;
}

.brand-sep { color: var(--text-muted); font-weight: 300; }

.brand-tagline {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 400;
}

.header-right { display: flex; align-items: center; gap: 14px; }

.date-pill {
  font-size: 12px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  font-variant-numeric: tabular-nums;
}

/* ── Buttons ──────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 13px;
  border-radius: 6px;
  border: 1px solid;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s ease;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.btn:disabled { opacity: 0.38; cursor: not-allowed; pointer-events: none; }

.btn-primary {
  background: var(--green);
  border-color: var(--green);
  color: #050505;
  font-weight: 600;
}
.btn-primary:hover { background: #1aff77; box-shadow: 0 0 14px rgba(0,255,102,0.35); }

.btn-green-outline {
  background: var(--green-glow);
  border-color: var(--green);
  color: var(--green);
}
.btn-green-outline:hover { background: var(--green-glow-2); box-shadow: 0 0 10px rgba(0,255,102,0.2); }

.btn-outline {
  background: transparent;
  border-color: var(--border-2);
  color: var(--text-dim);
}
.btn-outline:hover { border-color: #555; color: var(--text); }

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
  padding: 7px 10px;
}
.btn-ghost:hover { color: var(--text-dim); }

.btn-refresh {
  background: transparent;
  border-color: var(--border-2);
  color: var(--text-dim);
}
.btn-refresh:hover { border-color: var(--green); color: var(--green); }

/* ── Section scaffold ─────────────────────────────────────────────────── */
main { padding: 32px 0 72px; }
section { margin-bottom: 44px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
}

.section-rule { flex: 1; height: 1px; background: var(--border); }

.section-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1px 8px;
}

/* ── Overview grid ────────────────────────────────────────────────────── */
.overview-grid {
  display: grid;
  grid-template-columns: 5fr 4fr 3fr;
  gap: 10px;
}

.overview-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
}

.overview-card-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 7px;
}

/* ── Priorities ───────────────────────────────────────────────────────── */
.priority-list { list-style: none; display: flex; flex-direction: column; gap: 11px; }

.priority-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13px;
  line-height: 1.5;
}

.p-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.p-dot.high   { background: var(--red);    box-shadow: 0 0 5px rgba(255,68,85,0.5); }
.p-dot.medium { background: var(--yellow); }
.p-dot.low    { background: var(--text-muted); }

/* ── Schedule ─────────────────────────────────────────────────────────── */
.schedule-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }

.schedule-item { display: flex; gap: 12px; align-items: flex-start; font-size: 13px; }

.s-time {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 60px;
  padding-top: 1px;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

.s-title { color: var(--text); line-height: 1.4; }
.s-flag  { font-size: 11px; margin-left: 4px; }

.s-divider {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 6px 0 2px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* ── Flags ────────────────────────────────────────────────────────────── */
.flags-list { display: flex; flex-direction: column; gap: 7px; }

.flag-item {
  font-size: 12px;
  color: var(--text-dim);
  padding: 9px 12px;
  background: var(--surface-2);
  border-radius: 7px;
  border-left: 2px solid var(--yellow);
  line-height: 1.45;
}
.flag-item.none {
  border-left-color: var(--border-2);
  color: var(--text-muted);
  font-style: italic;
}

/* ── Inbox tabs ───────────────────────────────────────────────────────── */
.tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  padding: 9px 16px 11px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: color 0.15s;
}
.tab-btn:hover { color: var(--text-dim); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

.tab-count {
  font-size: 10px;
  font-weight: 600;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1px 6px;
  min-width: 20px;
  text-align: center;
}
.tab-btn.active .tab-count {
  background: var(--green-glow);
  border-color: rgba(0,255,102,0.3);
  color: var(--green);
}

/* ── Email cards ──────────────────────────────────────────────────────── */
.email-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 8px;
  transition: border-color 0.15s, opacity 0.25s;
  border-left-width: 3px;
}
.email-card:hover { border-color: var(--border-2); }
.email-card.urgent      { border-left-color: var(--red); }
.email-card.needs_reply { border-left-color: var(--yellow); }
.email-card.fyi         { border-left-color: var(--blue); }
.email-card.promotional { border-left-color: var(--border); }
.email-card.done        { opacity: 0.28; pointer-events: none; }

.email-from { font-size: 13px; font-weight: 600; color: var(--text); }
.email-subject { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
.email-snippet { font-size: 12px; color: var(--text-muted); margin-top: 7px; line-height: 1.5; }
.email-reason  { font-size: 11px; color: var(--text-muted); margin-top: 5px; font-style: italic; }

.draft-wrap { margin-top: 12px; }

.draft-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 7px;
}

.draft-body {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.65;
  white-space: pre-wrap;
  padding: 11px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 7px;
}

.draft-editor {
  width: 100%;
  min-height: 90px;
  background: var(--surface-2);
  border: 1px solid var(--green);
  border-radius: 7px;
  padding: 10px 13px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  line-height: 1.65;
  resize: vertical;
  outline: none;
  display: none;
}

.card-actions { display: flex; gap: 6px; margin-top: 13px; flex-wrap: wrap; align-items: center; }

/* ── Meeting cards ────────────────────────────────────────────────────── */
.meeting-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 8px;
  transition: border-color 0.15s, opacity 0.25s;
  border-left-width: 3px;
  border-left-color: var(--border);
}
.meeting-card:hover { border-color: var(--border-2); }
.meeting-card.reschedule { border-left-color: var(--purple); }
.meeting-card.done       { opacity: 0.28; pointer-events: none; }

.meeting-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.meeting-title { font-size: 14px; font-weight: 600; color: var(--text); }
.meeting-from  { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.meeting-quote {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 11px;
  padding: 8px 12px;
  background: var(--surface-2);
  border-radius: 6px;
  border-left: 2px solid var(--border-2);
}

.meeting-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 13px;
}

.meta-item { display: flex; flex-direction: column; gap: 2px; }

.meta-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.meta-value { font-size: 13px; color: var(--text); }

.meeting-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 10px;
  line-height: 1.5;
}

/* ── Status badges ────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 5px;
  white-space: nowrap;
}
.badge-free      { background: rgba(0,255,102,0.08); color: var(--green); }
.badge-conflict  { background: rgba(255,68,85,0.08); color: var(--red); }
.badge-unknown   { background: var(--surface-2); color: var(--text-muted); }
.badge-reschedule{ background: rgba(187,153,255,0.1); color: var(--purple); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }
.badge-sent      { background: rgba(0,255,102,0.08); color: var(--green); }
.badge-error     { background: rgba(255,68,85,0.08); color: var(--red); }
.badge-added     { background: rgba(0,255,102,0.08); color: var(--green); }

/* ── Loading ──────────────────────────────────────────────────────────── */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 96px 0;
  gap: 18px;
}

.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border-2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 13px; color: var(--text-muted); }

/* ── Inline AI-loading state ──────────────────────────────────────────── */
.spinner-sm {
  width: 14px; height: 14px;
  border: 2px solid var(--border-2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  flex-shrink: 0;
}

.ai-loading {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  padding: 10px 2px;
}

.raw-email-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border-2);
  border-radius: 10px;
  padding: 13px 18px;
  margin-bottom: 7px;
}

.raw-email-from    { font-size: 13px; font-weight: 600; color: var(--text); }
.raw-email-subject { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
.raw-email-snippet { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

/* ── Error ────────────────────────────────────────────────────────────── */
.error-card {
  background: rgba(255,68,85,0.04);
  border: 1px solid rgba(255,68,85,0.18);
  border-radius: 10px;
  padding: 28px;
  text-align: center;
  margin: 32px 0;
}
.error-msg { color: var(--red); font-size: 13px; margin-bottom: 16px; }

/* ── Empty ────────────────────────────────────────────────────────────── */
.empty { font-size: 12px; color: var(--text-muted); text-align: center; padding: 28px; font-style: italic; }

/* ── Animations ───────────────────────────────────────────────────────── */
.fade-in { animation: fadeIn 0.35s ease-out; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ───────────────────────────────────────────────────────── */
@media (max-width: 860px) {
  .overview-grid { grid-template-columns: 1fr; }
  .date-pill { display: none; }
}
@media (max-width: 600px) {
  .brand-tagline { display: none; }
  .brand-sep     { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="brand">
      <span class="brand-name">CYVL Servant</span>
      <span class="brand-sep">/</span>
      <span class="brand-tagline">AI Chief of Staff</span>
    </div>
    <div class="header-right">
      <span class="date-pill" id="date-pill">—</span>
      <button class="btn btn-refresh" id="refresh-btn" onclick="loadDashboard()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<main>
  <div class="container">

    <!-- Loading -->
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Generating your briefing…</div>
    </div>

    <!-- Error -->
    <div id="error-wrap" style="display:none"></div>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none">

      <!-- ── Section 1: Briefing ───────────────────────────────────────── -->
      <section>
        <div class="section-header">
          <span class="section-label">Morning Briefing</span>
          <div class="section-rule"></div>
        </div>

        <div class="overview-grid">

          <!-- Priorities -->
          <div class="overview-card">
            <div class="overview-card-title">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="var(--green)"><circle cx="12" cy="12" r="5"/></svg>
              Top Priorities
            </div>
            <ul class="priority-list" id="priorities-list"></ul>
          </div>

          <!-- Today's schedule -->
          <div class="overview-card">
            <div class="overview-card-title">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Schedule
            </div>
            <ul class="schedule-list" id="schedule-list"></ul>
          </div>

          <!-- Flags -->
          <div class="overview-card">
            <div class="overview-card-title">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
              Flags
            </div>
            <div class="flags-list" id="flags-list"></div>
          </div>

        </div>
      </section>

      <!-- ── Section 2: Inbox ──────────────────────────────────────────── -->
      <section>
        <div class="section-header">
          <span class="section-label">Inbox Triage</span>
          <div class="section-rule"></div>
          <span class="section-badge" id="inbox-badge">0 emails</span>
        </div>

        <!-- Phase 1: raw email list shown while AI loads -->
        <div id="raw-inbox-panel" style="display:none">
          <div class="ai-loading">
            <div class="spinner-sm"></div>
            <span>Analyzing emails…</span>
          </div>
          <div id="raw-email-list"></div>
        </div>

        <!-- Phase 2: categorized inbox (shown after AI analysis) -->
        <div id="categorized-inbox" style="display:none">
          <div class="tab-bar" id="inbox-tab-bar">
            <button class="tab-btn active" id="tab-urgent"      onclick="switchTab('urgent')">🔴 Urgent       <span class="tab-count" id="cnt-urgent">0</span></button>
            <button class="tab-btn"        id="tab-needs_reply" onclick="switchTab('needs_reply')">🟡 Needs Reply  <span class="tab-count" id="cnt-needs_reply">0</span></button>
            <button class="tab-btn"        id="tab-fyi"         onclick="switchTab('fyi')">🔵 FYI          <span class="tab-count" id="cnt-fyi">0</span></button>
            <button class="tab-btn"        id="tab-promotional" onclick="switchTab('promotional')">🗑 Noise        <span class="tab-count" id="cnt-promotional">0</span></button>
          </div>

          <div id="panel-urgent"      class="tab-panel"></div>
          <div id="panel-needs_reply" class="tab-panel" style="display:none"></div>
          <div id="panel-fyi"         class="tab-panel" style="display:none"></div>
          <div id="panel-promotional" class="tab-panel" style="display:none"></div>
        </div>
      </section>

      <!-- ── Section 3: Meeting Requests ──────────────────────────────── -->
      <section>
        <div class="section-header">
          <span class="section-label">Meeting Requests</span>
          <div class="section-rule"></div>
          <span class="section-badge" id="meetings-badge">0</span>
        </div>
        <div id="meetings-list"></div>
      </section>

    </div><!-- /dashboard -->
  </div>
</main>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────────────────
let _data      = null;   // Phase 1 data (schedule + raw emails)
let _activeTab = null;   // currently-shown inbox tab

// ── Helpers ──────────────────────────────────────────────────────────────────

// Safe HTML-escape — used for all user/API data inserted into innerHTML
function h(v) {
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// Format ISO datetime for display in the user's local timezone
function fmtDt(iso) {
  if (!iso) return 'Time TBD';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })
      + ' · '
      + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  } catch { return iso; }
}

function show(id)  { document.getElementById(id).style.display = ''; }
function hide(id)  { document.getElementById(id).style.display = 'none'; }
function el(id)    { return document.getElementById(id); }

// ── Load ─────────────────────────────────────────────────────────────────────

async function loadDashboard() {
  const btn = el('refresh-btn');
  btn.disabled = true;

  show('loading');
  hide('error-wrap');
  hide('dashboard');
  hide('raw-inbox-panel');
  hide('categorized-inbox');

  try {
    // ── Phase 1: fast — Gmail + Calendar APIs only, no Claude ──
    const res  = await fetch('/api/data');
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Server error');

    _data = json.data;
    el('date-pill').textContent = _data.date || '';

    renderSchedule();
    renderRawInbox();
    renderAILoadingStates();

    hide('loading');
    el('dashboard').style.display = '';
    el('dashboard').classList.add('fade-in');

    // ── Phase 2: async — Claude analysis runs after page is visible ──
    loadAnalysis();

  } catch (err) {
    hide('loading');
    el('error-wrap').innerHTML = `
      <div class="error-card">
        <div class="error-msg">⚠ Failed to load — ${h(err.message)}</div>
        <button class="btn btn-outline" onclick="loadDashboard()">Try again</button>
      </div>`;
    show('error-wrap');
  } finally {
    btn.disabled = false;
  }
}

async function loadAnalysis() {
  try {
    const res  = await fetch('/api/analyze', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(_data),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'AI analysis failed');

    // Merge AI data into _data so inbox send/meeting handlers still work
    Object.assign(_data, json.data);

    renderBriefing();   // priorities + flags
    renderInbox();      // categorized tabs with draft replies
    renderMeetings();   // meeting requests with conflict info

  } catch (err) {
    el('priorities-list').innerHTML =
      `<li style="color:var(--red);font-size:12px">⚠ AI analysis failed: ${h(err.message)}</li>`;
    el('flags-list').innerHTML =
      `<div class="flag-item" style="border-left-color:var(--red)">AI analysis unavailable</div>`;
    el('meetings-list').innerHTML =
      `<div class="empty">AI analysis failed — ${h(err.message)}</div>`;
    // Keep raw inbox visible
  }
}

// ── Phase 1 renderers ────────────────────────────────────────────────────────

function renderSchedule() {
  const d        = _data;
  const today    = d.today_schedule    || [];
  const tomorrow = d.tomorrow_schedule || [];
  const sList    = el('schedule-list');
  let html = '';

  if (!today.length && !tomorrow.length) {
    html = '<li style="color:var(--text-muted);font-style:italic;font-size:12px">No events today</li>';
  } else {
    html += today.map(e => `
      <li class="schedule-item">
        <span class="s-time">${h(e.time)}</span>
        <span class="s-title">${h(e.title)}${e.attendee_has_email ? '<span class="s-flag">📅</span>' : ''}</span>
      </li>`).join('');

    if (tomorrow.length) {
      html += `<li class="schedule-item" style="padding-top:4px">
                 <span class="s-time s-divider" style="min-width:60px;padding-top:6px">Tomorrow</span>
                 <span class="s-title s-divider" style="flex:1;padding-top:6px"></span>
               </li>`;
      html += tomorrow.map(e => `
        <li class="schedule-item">
          <span class="s-time" style="color:var(--text-muted)">${h(e.time)}</span>
          <span class="s-title" style="color:var(--text-dim)">${h(e.title)}</span>
        </li>`).join('');
    }
  }
  sList.innerHTML = html;
}

function renderRawInbox() {
  const emails = _data.emails || [];
  el('inbox-badge').textContent = `${emails.length} email${emails.length !== 1 ? 's' : ''}`;

  const list = el('raw-email-list');
  if (!emails.length) {
    list.innerHTML = '<div class="empty">No unread emails</div>';
  } else {
    list.innerHTML = emails.map(e => `
      <div class="raw-email-card">
        <div class="raw-email-from">${h(e.from_name || e.from_email)}</div>
        <div class="raw-email-subject">${h(e.subject)}</div>
        ${e.snippet ? `<div class="raw-email-snippet">${h(e.snippet)}</div>` : ''}
      </div>`).join('');
  }
  show('raw-inbox-panel');
}

function renderAILoadingStates() {
  el('priorities-list').innerHTML =
    '<li class="ai-loading"><div class="spinner-sm"></div><span>Analyzing…</span></li>';
  el('flags-list').innerHTML =
    '<div class="ai-loading"><div class="spinner-sm"></div><span>Analyzing…</span></div>';
  el('meetings-list').innerHTML =
    '<div class="ai-loading"><div class="spinner-sm"></div><span>Detecting meeting requests…</span></div>';
}

// ── Phase 2 renderers ────────────────────────────────────────────────────────

function renderBriefing() {
  const d = _data;

  // Priorities
  const pList     = el('priorities-list');
  const priorities = d.top_priorities || [];
  if (!priorities.length) {
    pList.innerHTML = '<li style="color:var(--text-muted);font-style:italic;font-size:12px">No priorities found</li>';
  } else {
    pList.innerHTML = priorities.map(p => `
      <li class="priority-item">
        <span class="p-dot ${h(p.urgency || 'medium')}"></span>
        <span>${h(p.text)}</span>
      </li>`).join('');
  }

  // Flags
  const fList = el('flags-list');
  const flags  = (d.flags || []).filter(Boolean);
  if (!flags.length) {
    fList.innerHTML = '<div class="flag-item none">Nothing to flag</div>';
  } else {
    fList.innerHTML = flags.map(f => `<div class="flag-item">${h(f)}</div>`).join('');
  }
}

// ── Inbox ─────────────────────────────────────────────────────────────────────

const CATS = ['urgent', 'needs_reply', 'fyi', 'promotional'];

function renderInbox() {
  // Swap Phase 1 raw panel for Phase 2 categorized view
  hide('raw-inbox-panel');
  show('categorized-inbox');

  const emails    = _data.inbox || [];
  const threadMap = _data._email_thread_map || {};

  const grouped = { urgent:[], needs_reply:[], fyi:[], promotional:[] };
  emails.forEach(e => { (grouped[e.category] || grouped.fyi).push(e); });

  el('inbox-badge').textContent = `${emails.length} email${emails.length !== 1 ? 's' : ''}`;

  CATS.forEach(cat => {
    const items = grouped[cat];
    el(`cnt-${cat}`).textContent = items.length;

    const panel = el(`panel-${cat}`);
    if (!items.length) {
      panel.innerHTML = '<div class="empty">No emails in this category</div>';
      return;
    }

    const hasDraftCats = new Set(['urgent', 'needs_reply']);

    panel.innerHTML = items.map((email, i) => {
      const tid     = h(threadMap[email.email_id] || '');
      const eid     = h(email.email_id);
      const hasDraft = hasDraftCats.has(cat) && email.draft_reply;

      return `
        <div class="email-card ${h(cat)}" id="ec-${eid}">
          <div class="email-from">${h(email.from_name || email.from_email)}</div>
          <div class="email-subject">${h(email.subject)}</div>
          ${email.snippet ? `<div class="email-snippet">${h(email.snippet)}</div>` : ''}
          <div class="email-reason">${h(email.reason)}</div>

          ${hasDraft ? `
            <div class="draft-wrap">
              <div class="draft-label">Draft Reply</div>
              <div class="draft-body"  id="db-${eid}">${h(email.draft_reply)}</div>
              <textarea class="draft-editor" id="de-${eid}">${h(email.draft_reply)}</textarea>
            </div>
            <div class="card-actions" id="ea-${eid}">
              <button class="btn btn-primary"
                data-eid="${eid}"
                data-to="${h(email.from_email)}"
                data-subject="${h(email.subject)}"
                data-thread="${tid}"
                onclick="handleSend(this)">Send</button>
              <button class="btn btn-outline"
                data-eid="${eid}"
                onclick="toggleEdit(this)">Edit</button>
              <button class="btn btn-ghost"
                data-eid="${eid}"
                onclick="skipEmail(this)">Skip</button>
            </div>
          ` : `
            <div class="card-actions">
              <button class="btn btn-ghost" data-eid="${eid}" onclick="skipEmail(this)">Skip</button>
            </div>
          `}
        </div>`;
    }).join('');
  });

  // Start on first non-empty tab, fall back to urgent
  const firstNonEmpty = CATS.find(c => grouped[c].length) || 'urgent';
  switchTab(firstNonEmpty);
}

function switchTab(cat) {
  _activeTab = cat;
  CATS.forEach(c => {
    el(`tab-${c}`).classList.toggle('active', c === cat);
    el(`panel-${c}`).style.display = c === cat ? '' : 'none';
  });
}

function toggleEdit(btn) {
  const eid = btn.dataset.eid;
  const db  = el(`db-${eid}`);
  const de  = el(`de-${eid}`);
  const sb  = el(`ea-${eid}`).querySelector('[data-to]');  // send button

  const editing = de.style.display !== 'none';
  if (editing) {
    // Commit the edit
    db.textContent = de.value;
    db.style.display = '';
    de.style.display = 'none';
    btn.textContent = 'Edit';
    if (sb) sb.textContent = 'Send';
  } else {
    de.value = db.textContent;
    db.style.display = 'none';
    de.style.display = '';
    de.focus();
    btn.textContent = 'Done';
    if (sb) sb.textContent = 'Send (edited)';
  }
}

async function handleSend(btn) {
  const eid      = btn.dataset.eid;
  const to       = btn.dataset.to;
  const subject  = btn.dataset.subject;
  const threadId = btn.dataset.thread;

  const de = el(`de-${eid}`);
  const db = el(`db-${eid}`);
  const editing = de && de.style.display !== 'none';
  const body = editing ? de.value : (db ? db.textContent : '');

  const replySubj = subject.startsWith('Re:') ? subject : `Re: ${subject}`;

  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const res  = await fetch('/api/send-reply', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email_id: eid, to, subject: replySubj, body, thread_id: threadId || null }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);

    el(`ea-${eid}`).innerHTML = '<span class="badge badge-sent">✓ Sent</span>';
    el(`ec-${eid}`).classList.add('done');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Send';
    el(`ea-${eid}`).insertAdjacentHTML('afterbegin',
      `<span class="badge badge-error">⚠ ${h(err.message)}</span>`);
  }
}

function skipEmail(btn) {
  const card = el(`ec-${btn.dataset.eid}`);
  card.classList.add('done');
  setTimeout(() => { card.style.display = 'none'; }, 280);
}

// ── Meetings ──────────────────────────────────────────────────────────────────

function renderMeetings() {
  const reqs = _data.meeting_requests || [];
  el('meetings-badge').textContent = reqs.length;
  const container = el('meetings-list');

  if (!reqs.length) {
    container.innerHTML = '<div class="empty">No meeting requests found in your inbox</div>';
    return;
  }

  container.innerHTML = reqs.map((req, i) => {
    const canUpdate  = req.is_reschedule && req.existing_event_id;
    const hasTime    = req.is_time_clear && req.proposed_start_iso;
    const timeStr    = hasTime ? fmtDt(req.proposed_start_iso) : 'Time not specified';

    // Conflict badge
    let conflictHtml = '';
    if (req.conflict_info) {
      if (req.conflict_info.has_conflict) {
        conflictHtml = `<span class="badge badge-conflict">⚠ Conflicts: ${h((req.conflict_info.names||[]).join(', '))}</span>`;
      } else {
        conflictHtml = `<span class="badge badge-free">✅ Free</span>`;
      }
    } else if (hasTime) {
      conflictHtml = `<span class="badge badge-unknown">No conflict data</span>`;
    }

    // Reschedule context line
    const rescheduleHtml = canUpdate ? `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="badge badge-reschedule">Reschedule</span>
        ${req.existing_event_time
          ? `<span style="font-size:12px;color:var(--text-dim)">Moving from: ${h(req.existing_event_time)}</span>`
          : ''}
      </div>` : '';

    // Action buttons
    let actionsHtml;
    if (canUpdate) {
      actionsHtml = `
        <button class="btn btn-green-outline" data-idx="${i}" onclick="handleUpdateEvent(this)">Update Event</button>
        <button class="btn btn-outline"       data-idx="${i}" onclick="handleAddEvent(this, true)">Create New</button>
        <button class="btn btn-ghost"         data-idx="${i}" onclick="skipMeeting(this)">Skip</button>`;
    } else if (hasTime) {
      actionsHtml = `
        <button class="btn btn-green-outline" data-idx="${i}" onclick="handleAddEvent(this, false)">Add to Calendar</button>
        <button class="btn btn-ghost"         data-idx="${i}" onclick="skipMeeting(this)">Skip</button>`;
    } else {
      actionsHtml = `
        <button class="btn btn-ghost" data-idx="${i}" onclick="skipMeeting(this)">Skip</button>`;
    }

    const guests = (req.attendees || []).slice(0, 3).join(', ');

    return `
      <div class="meeting-card${req.is_reschedule ? ' reschedule' : ''}" id="mc-${i}">
        ${rescheduleHtml}
        <div class="meeting-top">
          <div>
            <div class="meeting-title">${h(req.title)}</div>
            <div class="meeting-from">from ${h(req.from_name)}</div>
          </div>
          <div>${conflictHtml}</div>
        </div>
        <div class="meeting-quote">"${h(req.source_quote)}"</div>
        <div class="meeting-meta">
          <div class="meta-item">
            <span class="meta-label">Time</span>
            <span class="meta-value">${h(timeStr)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Duration</span>
            <span class="meta-value">${req.duration_minutes || 60} min</span>
          </div>
          ${guests ? `<div class="meta-item">
            <span class="meta-label">Guests</span>
            <span class="meta-value">${h(guests)}</span>
          </div>` : ''}
        </div>
        ${req.description ? `<div class="meeting-desc">${h(req.description)}</div>` : ''}
        <div class="card-actions" id="ma-${i}">
          ${actionsHtml}
        </div>
      </div>`;
  }).join('');
}

async function handleAddEvent(btn, isCreateNew) {
  const i   = parseInt(btn.dataset.idx);
  const req = _data.meeting_requests[i];

  btn.disabled = true;
  btn.textContent = 'Adding…';

  try {
    const res  = await fetch('/api/add-event', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        title:            req.title,
        start_iso:        req.proposed_start_iso,
        end_iso:          req.proposed_end_iso,
        duration_minutes: req.duration_minutes || 60,
        description:      req.description || '',
        attendees:        req.attendees || [],
      }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);

    el(`ma-${i}`).innerHTML = `
      <span class="badge badge-added">✓ Added to calendar</span>
      ${json.link ? `<a href="${h(json.link)}" target="_blank" style="font-size:11px;color:var(--green)">View →</a>` : ''}`;
    el(`mc-${i}`).classList.add('done');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = isCreateNew ? 'Create New' : 'Add to Calendar';
    el(`ma-${i}`).insertAdjacentHTML('afterbegin',
      `<span class="badge badge-error">⚠ ${h(err.message)}</span>`);
  }
}

async function handleUpdateEvent(btn) {
  const i   = parseInt(btn.dataset.idx);
  const req = _data.meeting_requests[i];

  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    const res  = await fetch('/api/update-event', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        event_id:         req.existing_event_id,
        start_iso:        req.proposed_start_iso,
        end_iso:          req.proposed_end_iso,
        duration_minutes: req.duration_minutes || 60,
      }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);

    el(`ma-${i}`).innerHTML = `
      <span class="badge badge-added">✓ Event updated</span>
      ${json.link ? `<a href="${h(json.link)}" target="_blank" style="font-size:11px;color:var(--green)">View →</a>` : ''}`;
    el(`mc-${i}`).classList.add('done');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Update Event';
    el(`ma-${i}`).insertAdjacentHTML('afterbegin',
      `<span class="badge badge-error">⚠ ${h(err.message)}</span>`);
  }
}

function skipMeeting(btn) {
  const i    = parseInt(btn.dataset.idx);
  const card = el(`mc-${i}`);
  card.classList.add('done');
  setTimeout(() => { card.style.display = 'none'; }, 280);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
loadDashboard();
</script>
</body>
</html>
